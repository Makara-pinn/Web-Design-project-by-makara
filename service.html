<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Picture Card with Title</title>
  <style>
    .no {
      width: 250px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      text-align: center;
      background: #fff;
      margin: 20px;
    }

    .no img {
      width: 100%;
      height: auto;
      display: block;
    }

    .no-title {
      padding: 12px;
      font-size: 18px;
      font-weight: bold;
      color: #333;
     } 
  </style>
</head>
<body>
  <div class="no  ">
    <img src="/img/coffee.jpg" alt="Coffee">
    <div class="card-title">Coffee Adventure</div>
  </div>
</body>
</html>
